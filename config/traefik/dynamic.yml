http:
  middlewares:
    # Middleware di Forward-Auth che interroga OAuth2-Proxy per validare la sessione
    quiz-auth:
      forwardAuth:
        address: "http://oauth2-proxy:4180/auth"
        trustForwardHeader: true
        authResponseHeaders:
          - "X-Auth-Request-User"
          - "X-Auth-Request-Email"
          - "X-Auth-Request-Preferred-Username"
          - "X-Auth-Request-Groups"
