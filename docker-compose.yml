networks:
  gateway-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  auth-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
  mesh-net:
    driver: bridge
    internal: true # Isolata L3
    ipam:
      config:
        - subnet: 172.22.0.0/24

volumes:
  postgres_auth_data:

services:
  # ==========================================
  # STRATO 1: GATEWAY & REVERSE PROXY
  # ==========================================
  traefik:
    image: traefik:v3.0
    container_name: quiz-traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - gateway-net
    ports:
      - "80:80"        # Porta pubblica di ingresso all'LXC (smistata da Caddy)
      - "8080:8080"    # Dashboard di Traefik (opzionale, solo interna)
    environment:
      - DOCKER_API_VERSION=1.40
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./config/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro

  # ==========================================
  # STRATO 2: GESTIONE IDENTITÀ (SSO)
  # ==========================================
  postgres-auth:
    image: postgres:16-alpine
    container_name: quiz-postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${DB_AUTH_PASSWORD}
    networks:
      - auth-net
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: quiz-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-auth/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${DB_AUTH_PASSWORD}
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME_URL: https://quizlab.techmatrix.it/auth
      KC_HTTP_ENABLED: "true"
    networks:
      - auth-net
      - gateway-net
    volumes:
      - ./config/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`quizlab.techmatrix.it`) && PathPrefix(`/auth`)"
      - "traefik.http.routers.keycloak.entrypoints=web"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    depends_on:
      - postgres-auth

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: quiz-oauth2-proxy
    restart: unless-stopped
    environment:
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_CLIENT_ID: oauth2-proxy-client
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_OIDC_ISSUER_URL: https://quizlab.techmatrix.it/auth/realms/QuizLab
      OAUTH2_PROXY_COOKIE_SECRET: ${COOKIE_SECRET}
      OAUTH2_PROXY_REDIRECT_URL: https://quizlab.techmatrix.it/oauth2/callback
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_UPSTREAMS: file:///dev/null
    networks:
      - gateway-net
      - auth-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oauth2.rule=Host(`quizlab.techmatrix.it`) && PathPrefix(`/oauth2/`)"
      - "traefik.http.routers.oauth2.entrypoints=web"
      - "traefik.http.services.oauth2.loadbalancer.server.port=4180"
    depends_on:
      - keycloak

  landing-page:
    image: nginx:alpine
    container_name: quiz-landing
    restart: unless-stopped
    networks:
      - gateway-net
    volumes:
      - ./landing-page/html:/usr/share/nginx/html:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.landing.rule=Host(`quizlab.techmatrix.it`) && (Path(`/`) || PathPrefix(`/static/`))"
      - "traefik.http.routers.landing.entrypoints=web"
