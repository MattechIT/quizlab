networks:
  gateway-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  auth-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24

volumes:
  postgres_auth_data:

services:
  # Database di autenticazione dedicato a Keycloak (collegato solo ad auth-net)
  postgres-auth:
    image: postgres:16-alpine
    container_name: quiz-postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${DB_AUTH_PASSWORD}
    networks:
      - auth-net
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data

  # Identity Provider Keycloak (collegato ad auth-net per il DB e gateway-net per Traefik)
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: quiz-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-auth/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${DB_AUTH_PASSWORD}
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_RELATIVE_PATH: /auth
      # KC_HOSTNAME_URL: https://quizlab.techmatrix.it/auth # Disabilitato temporaneamente per lo Step 1.3
      KC_HTTP_ENABLED: "true"
    networks:
      - auth-net
      - gateway-net
    ports:
      - "8080:8080" # Temporaneo
    volumes:
      - ./config/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`quizlab.techmatrix.it`) && PathPrefix(`/auth`)"
      - "traefik.http.routers.keycloak.entrypoints=web"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    depends_on:
      - postgres-auth
