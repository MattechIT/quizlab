networks:
  gateway-net:
    name: gateway-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  auth-net:
    name: auth-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
  mesh-net:
    name: mesh-net
    driver: bridge
    internal: true # Isolata L3
    ipam:
      config:
        - subnet: 172.22.0.0/24

volumes:
  postgres_auth_data:
  postgres_app_data:

services:
  # ==========================================
  # STRATO 1: GATEWAY & REVERSE PROXY
  # ==========================================
  traefik:
    image: traefik:latest
    container_name: quiz-traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - gateway-net
    ports:
      - "80:80"        # Porta pubblica di ingresso all'LXC (smistata da Caddy)
      - "8080:8080"    # Dashboard di Traefik (opzionale, solo interna)
    environment:
      - DOCKER_API_VERSION=1.40
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./config/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro

  # ==========================================
  # STRATO 2: GESTIONE IDENTITÀ (SSO)
  # ==========================================
  postgres-auth:
    image: postgres:16-alpine
    container_name: quiz-postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${DB_AUTH_PASSWORD}
    networks:
      - auth-net
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: quiz-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-auth/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${DB_AUTH_PASSWORD}
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME_URL: https://quizlab.techmatrix.it/auth
      KC_HTTP_ENABLED: "true"
    networks:
      - auth-net
      - gateway-net
    volumes:
      - ./config/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`quizlab.techmatrix.it`) && PathPrefix(`/auth`)"
      - "traefik.http.routers.keycloak.entrypoints=web"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    depends_on:
      - postgres-auth

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: quiz-oauth2-proxy
    restart: unless-stopped
    environment:
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_CLIENT_ID: oauth2-proxy-client
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_OIDC_ISSUER_URL: https://quizlab.techmatrix.it/auth/realms/QuizLab
      OAUTH2_PROXY_COOKIE_SECRET: ${COOKIE_SECRET}
      OAUTH2_PROXY_REDIRECT_URL: https://quizlab.techmatrix.it/oauth2/callback
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_UPSTREAMS: file:///dev/null
      OAUTH2_PROXY_INSECURE_OIDC_ALLOW_UNVERIFIED_EMAIL: "true" # Accetta email non verificate per lo sviluppo
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"                  # Salta la schermata intermedia di OAuth2-Proxy
    networks:
      - gateway-net
      - auth-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oauth2.rule=Host(`quizlab.techmatrix.it`) && PathPrefix(`/oauth2/`)"
      - "traefik.http.routers.oauth2.entrypoints=web"
      - "traefik.http.services.oauth2.loadbalancer.server.port=4180"
    depends_on:
      - keycloak

  landing-page:
    image: nginx:alpine
    container_name: quiz-landing
    restart: unless-stopped
    networks:
      - gateway-net
    volumes:
      - ./landing-page/html:/usr/share/nginx/html:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.landing.rule=Host(`quizlab.techmatrix.it`) && (Path(`/`) || PathPrefix(`/static/`))"
      - "traefik.http.routers.landing.entrypoints=web"

  # ==========================================
  # STRATO 3: BUSINESS LOGIC & STORAGE (BACKEND PRIVATE)
  # ==========================================
  postgres-app:
    image: postgres:16-alpine
    container_name: quiz-postgres-app
    restart: unless-stopped
    environment:
      POSTGRES_DB: quizlab
      POSTGRES_USER: quizlab_user
      POSTGRES_PASSWORD: ${DB_APP_PASSWORD}
    networks:
      - mesh-net
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  api-content:
    build: ./api-content
    container_name: quiz-api-content
    restart: unless-stopped
    environment:
      - DB_HOST=postgres-app
      - DB_USER=quizlab_user
      - DB_PASSWORD=${DB_APP_PASSWORD}
      - DB_NAME=quizlab
      - STATS_SERVICE_URL=http://api-stats:3000/api/v1/stats
      - PORT=3000
    networks:
      - gateway-net
      - mesh-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-content.rule=Host(`quizlab.techmatrix.it`) && PathPrefix(`/api/`)"
      - "traefik.http.routers.api-content.entrypoints=web"
      - "traefik.http.routers.api-content.middlewares=quiz-auth@file" # Applica il middleware di Forward-Auth
      - "traefik.http.services.api-content.loadbalancer.server.port=3000"
    depends_on:
      - postgres-app

  api-stats:
    build: ./api-stats
    container_name: quiz-api-stats
    restart: unless-stopped
    environment:
      - DB_HOST=postgres-app
      - DB_USER=quizlab_user
      - DB_PASSWORD=${DB_APP_PASSWORD}
      - DB_NAME=quizlab
      - PORT=3000
    networks:
      - mesh-net
    # Totalmente privato: non ha etichette Traefik
    depends_on:
      - postgres-app
